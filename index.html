<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CoreBoard - 社内ボード（開発中サンプル）</title>
<link rel="icon" type="image/png" href="favicon.png?v=1">
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=1">
<link rel="manifest" href="manifest.json?v=1">
<meta name="theme-color" content="#2563eb">
<link rel="stylesheet" href="css/launcher.css?v=6">
<style>
  :root{
    --acc:#06b6d4; --acc2:#22d3ee; --accd:#0891b2;
    --bg:#0e1116; --bg2:#161b22; --bg3:#1d242e; --bg4:#252e3a;
    --text:#e6edf3; --text2:#9aa7b4; --text3:#6b7886;
    --border:rgba(255,255,255,.10); --r:12px;
  }
  [data-theme="light"]{ --bg:#f1f5f9;--bg2:#ffffff;--bg3:#eef2f7;--bg4:#e2e8f0;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--border:rgba(15,23,42,.12); }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic Medium","Meiryo",sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}
  .dev-badge{display:inline-flex;align-items:center;gap:5px;margin-left:10px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap;color:#fff;border:1px solid rgba(255,255,255,.25);background:repeating-linear-gradient(45deg,#0891b2,#0891b2 8px,#0e7490 8px,#0e7490 16px)}

  #cb-login{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 600px at 50% -10%,#0c3b46 0%,#0a1418 55%,#090d0f 100%)}
  #cb-login .lc{width:min(92vw,380px);background:rgba(16,28,32,.92);border:1px solid rgba(6,182,212,.35);border-radius:16px;padding:30px 26px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  #cb-login .lg{font-size:30px;font-weight:800}.cb .lg b,#cb-login .lg b{color:var(--acc2)}
  #cb-login .sub{margin-top:6px;font-size:13px;color:#8fb4bd}
  #cb-login .badge{margin:16px auto 0}
  #cb-login .btn{margin-top:20px;width:100%;padding:12px;border:0;border-radius:10px;background:var(--accd);color:#fff;font-size:15px;font-weight:700}
  #cb-login .btn:hover{background:var(--acc)}
  #cb-login .btn.ghost{background:transparent;border:1px solid rgba(143,180,189,.35);color:#7fa3ac;cursor:not-allowed;margin-top:10px}
  #cb-login .note{margin-top:16px;font-size:11.5px;line-height:1.6;color:#6e8d95}
  #cb-login .ver{margin-top:14px;font-size:11px;color:#5a747b}

  #app{display:grid;grid-template-columns:230px 1fr;grid-template-rows:54px 1fr;height:100vh}
  #topbar{grid-column:1/3;display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--bg2);border-bottom:1px solid var(--border);z-index:20}
  .logo{font-size:18px;font-weight:800}.logo b{color:var(--acc2)}
  .logo .ver{font-size:11px;color:var(--text3);font-weight:600;margin-left:4px}
  .spacer{flex:1}
  .tb-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px}
  .tb-btn:hover{border-color:var(--acc)}
  .tb-btn.primary{background:var(--accd);border-color:var(--accd);color:#fff;font-weight:600}
  .tb-btn.primary:hover{background:var(--acc)}

  #side{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:10px 0;z-index:10}
  #side-body{flex:1 1 auto}
  .sg{font-size:10px;color:var(--text3);letter-spacing:.08em;padding:12px 16px 4px;text-transform:uppercase}
  .si{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:13px;color:var(--text2)}
  .si:hover{background:var(--bg3);color:var(--text)}
  .si.on{background:var(--bg3);color:var(--text);box-shadow:inset 3px 0 0 var(--acc)}
  .si .mc{margin-left:auto;font-size:10.5px;color:var(--text3)}

  #main{display:flex;flex-direction:column;overflow:hidden;position:relative}
  .b-head{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg2);z-index:5}
  .b-title{font-size:16px;font-weight:800;cursor:pointer;border:1px solid transparent;padding:3px 8px;border-radius:7px}
  .b-title:hover{border-color:var(--border);background:var(--bg3)}
  .b-scope{font-size:11px;font-weight:700;color:var(--acc2);background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.4);padding:3px 10px;border-radius:999px}
  .b-mem{display:flex;gap:-6px}
  .av{width:28px;height:28px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2);margin-left:-6px}
  .b-tools{margin-left:auto;display:flex;gap:6px;align-items:center}
  .b-tools .srch{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;width:180px;font-size:12.5px}
  .b-tools button{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:12.5px}
  .b-tools button:hover{border-color:var(--acc)}
  .b-tools button.act{border-color:var(--acc);color:var(--acc2)}

  #board{flex:1;overflow:auto;padding:14px 16px}
  /* ===== ビュータブ ===== */
  .v-tabs{display:flex;gap:4px;padding:7px 16px 0;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
  .vtab{background:none;border:0;border-bottom:2px solid transparent;color:var(--text2);padding:8px 12px;font-size:13px;border-radius:7px 7px 0 0;white-space:nowrap}
  .vtab:hover{background:var(--bg3);color:var(--text)}
  .vtab.on{color:var(--acc2);border-bottom-color:var(--acc);font-weight:700}
  /* テーブル */
  table.vt{width:100%;border-collapse:collapse;font-size:13px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  table.vt th{background:var(--bg3);text-align:left;padding:9px 12px;font-size:11.5px;color:var(--text2);border-bottom:1px solid var(--border)}
  table.vt td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
  table.vt tr{cursor:pointer}
  table.vt tbody tr:hover td{background:var(--bg3)}
  .tdot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:middle}
  /* カレンダー */
  .cal-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .cal-head button{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px}
  .cal-head .cal-ym{font-weight:700;font-size:14px;min-width:110px;text-align:center}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-dow{text-align:center;font-size:11px;color:var(--text2);padding-bottom:2px}
  .cal-dow.sun{color:#f87171}.cal-dow.sat{color:#60a5fa}
  .cal-cell{min-height:98px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:5px 6px;display:flex;flex-direction:column;gap:3px}
  .cal-cell.empty{background:transparent;border:none}
  .cal-cell.today{border-color:var(--acc)}
  .cal-d{font-size:11px;font-weight:700}.cal-d.sun{color:#f87171}.cal-d.sat{color:#60a5fa}
  .cal-card{font-size:11px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 5px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-card.over{border-color:#b91c1c}.cal-card.today{border-color:#b45309}
  .cc-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
  /* ダッシュボード */
  .dash-stat{font-size:13px;color:var(--text2);margin-bottom:12px}
  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
  .dash-h{font-size:13px;font-weight:700;margin-bottom:10px}
  .dbar{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px}
  .dbar-l{width:120px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dbar-t{flex:1;background:var(--bg4);height:14px;border-radius:7px;overflow:hidden}
  .dbar-t i{display:block;height:100%;border-radius:7px}
  .dbar-v{width:26px;text-align:right;font-weight:700}
  @media(max-width:680px){.dash-grid{grid-template-columns:1fr}}
  /* ガントチャート */
  .gt-tb{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:12px;color:var(--text2);flex-wrap:wrap}
  .gt-u{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 10px;font-size:12px}
  .gt-u.on{border-color:var(--acc);color:var(--acc2);font-weight:700}
  .gt-wrap{position:relative;min-width:max-content;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg2)}
  .gt-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border)}
  .gt-row:last-child{border-bottom:none}
  .gt-head{position:sticky;top:0;z-index:2;background:var(--bg2)}
  .gt-lane{flex:0 0 190px;padding:8px 10px;font-size:12.5px;font-weight:700;border-right:1px solid var(--border);background:var(--bg2);position:sticky;left:0;z-index:1;display:flex;align-items:center}
  .gt-track{position:relative}
  .gt-months{position:relative;height:20px;border-bottom:1px solid var(--border)}
  .gt-mn{position:absolute;top:2px;font-size:11px;font-weight:700;color:var(--text2)}
  .gt-days{display:flex;height:20px;font-size:10px;color:var(--text3)}
  .gt-dy{flex:0 0 auto;text-align:center;line-height:20px;border-right:1px solid rgba(128,128,128,.08)}
  .gt-dy.sun{color:#f87171}.gt-dy.sat{color:#60a5fa}
  .gt-bar{position:absolute;height:24px;border-radius:6px;color:#06222b;font-size:11px;font-weight:700;cursor:grab;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;overflow:hidden}
  .gt-bar:active{cursor:grabbing}
  .gt-lbl{padding:0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;pointer-events:none}
  .gt-h{width:9px;align-self:stretch;cursor:ew-resize;flex:0 0 auto}
  .gt-today{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;z-index:3}
  .gt-uns{margin-top:12px;border:1px dashed var(--border);border-radius:10px;padding:8px 10px}
  .gt-uns-h{font-size:11px;color:var(--text3);margin-bottom:6px}
  .gt-uns-l{display:flex;gap:6px;flex-wrap:wrap}
  .gt-chip{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:12px;cursor:pointer}
  .gt-chip:hover{border-color:var(--acc)}
  .lists{display:flex;gap:12px;align-items:flex-start;height:100%}
  .list{flex:0 0 272px;max-height:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 150px)}
  .list.dragging{opacity:.5}
  .list-h{padding:9px 10px 7px;display:flex;align-items:center;gap:6px}
  .list-h .lh-grip{cursor:grab;color:var(--text3);font-size:13px;padding:2px}
  .list-h .lh-name{flex:1;font-size:13.5px;font-weight:700;cursor:text;padding:3px 6px;border-radius:6px;border:1px solid transparent}
  .list-h .lh-name:hover{background:var(--bg3)}
  .list-h .lh-cnt{font-size:11px;color:var(--acc2);background:rgba(6,182,212,.12);padding:1px 8px;border-radius:10px}
  .list-h .lh-menu{background:none;border:0;color:var(--text3);font-size:15px;padding:2px 6px;border-radius:6px}
  .list-h .lh-menu:hover{background:var(--bg3);color:var(--text)}
  .list-c{padding:0 8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:7px;min-height:8px}
  .list-c.dover{background:rgba(6,182,212,.06)}
  .list-f{padding:7px 8px 9px}
  .addc{width:100%;background:none;border:0;text-align:left;color:var(--text3);font-size:12.5px;padding:7px 8px;border-radius:7px}
  .addc:hover{background:var(--bg3);color:var(--acc2)}
  .composer textarea{width:100%;background:var(--bg3);border:1px solid var(--acc);color:var(--text);border-radius:7px;padding:8px;font-size:13px;resize:none;min-height:56px}
  .composer .cr{display:flex;gap:6px;margin-top:6px}
  .composer .cr button{border-radius:7px;padding:6px 12px;font-size:12.5px;border:1px solid var(--border);background:var(--bg3);color:var(--text)}
  .composer .cr button.pri{background:var(--accd);border-color:var(--accd);color:#fff;font-weight:600}

  .card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 9px;cursor:pointer;position:relative}
  .card:hover{border-color:var(--acc)}
  .card.dragging{opacity:.35}
  .card .cover{height:8px;border-radius:5px;margin:-2px -3px 7px}
  .card .labels{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
  .card .lb{height:8px;min-width:34px;border-radius:4px}
  .card .lb.named{height:auto;min-width:0;padding:1px 7px;font-size:10px;font-weight:700;color:#06222b}
  .card .ct{font-size:13px;line-height:1.45;font-weight:500}
  .card .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:7px}
  .card .mi{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--text3)}
  .card .mi.due{padding:1px 6px;border-radius:5px;border:1px solid var(--border)}
  .card .mi.due.over{background:#7f1d1d;color:#fecaca;border-color:#b91c1c}
  .card .mi.due.soon{background:#78350f;color:#fde68a;border-color:#b45309}
  .card .mi.due.done{background:#14532d;color:#bbf7d0;border-color:#15803d}
  .card .mi.chk.alldone{color:#34d399}
  .card .mem{margin-left:auto;display:flex}
  .card .mem .av{width:24px;height:24px;font-size:10px;margin-left:-5px;border-color:var(--bg3)}
  .ph{height:42px;border:2px dashed var(--acc);border-radius:8px;background:rgba(6,182,212,.08)}

  .add-list{flex:0 0 272px}
  .add-list button{width:100%;background:rgba(255,255,255,.04);border:1px dashed var(--border);border-radius:12px;color:var(--text2);font-size:13px;padding:11px}
  .add-list button:hover{border-color:var(--acc);color:var(--acc2)}
  .add-list .composer{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:8px}
  .add-list input{width:100%;background:var(--bg3);border:1px solid var(--acc);color:var(--text);border-radius:7px;padding:8px;font-size:13px}

  /* ポップオーバー / メニュー */
  .pop{position:fixed;z-index:120;background:var(--bg2);border:1px solid var(--border);border-radius:12px;box-shadow:0 14px 40px rgba(0,0,0,.55);padding:10px;width:280px;display:none}
  .pop.open{display:block}
  .pop h4{margin:0 0 8px;font-size:13px;text-align:center;color:var(--text2)}
  .pop .px{position:absolute;right:8px;top:6px;background:none;border:0;color:var(--text3);font-size:16px}
  .pop .row{display:flex;align-items:center;gap:8px;padding:6px;border-radius:7px;cursor:pointer}
  .pop .row:hover{background:var(--bg3)}
  .pop .lbopt{height:30px;border-radius:6px;flex:1;display:flex;align-items:center;padding:0 9px;font-size:12px;font-weight:700;color:#06222b}
  .pop .mini{background:none;border:0;color:var(--text3);font-size:14px;padding:4px}
  .pop input[type=text],.pop input[type=date]{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px;font-size:13px}
  .pop .pbtn{width:100%;margin-top:8px;background:var(--accd);border:0;color:#fff;border-radius:8px;padding:9px;font-weight:600}
  .menu{position:fixed;z-index:120;background:var(--bg2);border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 34px rgba(0,0,0,.5);padding:5px;min-width:200px;display:none}
  .menu.open{display:block}
  .menu button{display:block;width:100%;text-align:left;background:none;border:0;color:var(--text);padding:8px 10px;border-radius:7px;font-size:13px}
  .menu button:hover{background:var(--bg3)}
  .menu button.danger:hover{color:#ef4444}
  .menu .sep{height:1px;background:var(--border);margin:4px 2px}

  /* カード詳細モーダル */
  .modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);display:none;align-items:flex-start;justify-content:center;overflow:auto;padding:40px 14px}
  .modal.open{display:flex}
  .mbox{width:min(96vw,760px);background:var(--bg2);border:1px solid var(--border);border-radius:14px;box-shadow:0 24px 70px rgba(0,0,0,.6);overflow:hidden}
  .mcover{height:0}
  .mbody{display:grid;grid-template-columns:1fr 190px;gap:16px;padding:18px 20px 22px}
  .mclose{position:absolute;top:48px;right:calc(50% - min(48vw,380px) + 8px);background:var(--bg3);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:8px;z-index:2}
  .m-title{font-size:18px;font-weight:800;width:100%;background:transparent;border:1px solid transparent;color:var(--text);border-radius:8px;padding:4px 8px}
  .m-title:hover,.m-title:focus{background:var(--bg3);border-color:var(--border);outline:none}
  .m-sub{font-size:12px;color:var(--text3);margin:2px 0 14px 8px}
  .m-sec{margin-bottom:16px}
  .m-sec .h{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:7px;display:flex;align-items:center;gap:6px}
  .m-chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .chip-lb{height:30px;border-radius:6px;padding:0 11px;display:flex;align-items:center;font-size:12px;font-weight:700;color:#06222b}
  .chip-mem{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
  .m-desc{width:100%;min-height:70px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px;font-size:13px;line-height:1.7;resize:vertical}
  .m-due{display:inline-flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px}
  .chk{margin-bottom:12px}
  .chk-bar{height:8px;background:var(--bg4);border-radius:5px;overflow:hidden;margin:4px 0 8px}
  .chk-bar i{display:block;height:100%;background:#22c55e;border-radius:5px}
  .chk-item{display:flex;align-items:center;gap:8px;padding:4px 2px;font-size:13px}
  .chk-item input{width:16px;height:16px}
  .chk-item.done span{text-decoration:line-through;color:var(--text3)}
  .chk-item .del{margin-left:auto;background:none;border:0;color:var(--text3);font-size:13px;opacity:0;cursor:pointer}
  .chk-item:hover .del{opacity:1}
  .chk-add{display:flex;gap:6px;margin-top:4px}
  .chk-add input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 8px;font-size:12.5px}
  .cm-add{display:flex;gap:8px;margin-bottom:10px}
  .cm-add textarea{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px;font-size:13px;min-height:38px;resize:vertical}
  .cm-item{display:flex;gap:9px;margin-bottom:10px}
  .cm-item .b{flex:1}
  .cm-item .who{font-size:12px;font-weight:700}
  .cm-item .at{font-size:10.5px;color:var(--text3);margin-left:6px}
  .cm-item .tx{font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 9px;margin-top:3px;line-height:1.6;white-space:pre-wrap}
  .m-side .sbtn{display:flex;align-items:center;gap:8px;width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:12.5px;margin-bottom:7px;text-align:left}
  .m-side .sbtn:hover{border-color:var(--acc)}
  .m-side .sh{font-size:10.5px;color:var(--text3);letter-spacing:.06em;margin:12px 0 6px;text-transform:uppercase}
  .m-side .sbtn.danger:hover{border-color:#ef4444;color:#ef4444}
  @media(max-width:680px){ .mbody{grid-template-columns:1fr} }

<script>
/* ============================================================
   CoreBoard v0.2.0 — Trello相当の社内カンバン（単一HTML・DBなし）
   ボード/リスト/カード＋DnD、カード詳細（説明/ラベル/期限/担当/
   チェックリスト/コメント/カバー）、フィルター/検索。localStorage保存。
   ============================================================ */
function cbLogin(){ try{localStorage.setItem('cb_authed','1')}catch(e){} document.getElementById('cb-login').style.display='none'; }
(function(){ var a=false; try{a=localStorage.getItem('cb_authed')==='1'}catch(e){} if(a)document.getElementById('cb-login').style.display='none'; })();
function cbTheme(){ var r=document.documentElement; var n=r.getAttribute('data-theme')==='light'?'dark':'light'; r.setAttribute('data-theme',n); document.getElementById('theme-btn').textContent=n==='light'?'☀️':'🌙'; }
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(p){ return (p||'x')+Date.now().toString(36)+Math.floor(Math.random()*1296).toString(36); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},1700); }

/* ===== 名簿（本実装ではCoreFlow portalMembers） ===== */
var ROSTER=[{id:'yu',name:'ゆうた',color:'#0891b2'},{id:'de',name:'デザイナー',color:'#db2777'},{id:'si',name:'椎名',color:'#7c3aed'},{id:'ha',name:'箱田',color:'#16a34a'},{id:'ri',name:'林',color:'#ea580c'},{id:'ta',name:'高橋',color:'#0ea5e9'}];
function member(id){ return ROSTER.find(function(m){return m.id===id;}); }
function initial(name){ return String(name||'?').trim().slice(0,1); }

/* ===== ラベル色 ===== */
var LB=[{c:'#61bd4f',n:'緑'},{c:'#f2d600',n:'黄'},{c:'#ff9f1a',n:'橙'},{c:'#eb5a46',n:'赤'},{c:'#c377e0',n:'紫'},{c:'#0079bf',n:'青'},{c:'#00c2e0',n:'水'},{c:'#51e898',n:'黄緑'},{c:'#ff78cb',n:'桃'},{c:'#344563',n:'黒'}];
var BG=['#0e7490','#1e3a8a','#6d28d9','#9d174d','#166534','#9a3412','#334155','#0e1116'];

/* ===== 初期サンプル ===== */
function defLabels(){ return [{id:uid('l'),c:'#61bd4f',n:'順調'},{id:uid('l'),c:'#f2d600',n:'要確認'},{id:uid('l'),c:'#eb5a46',n:'至急'},{id:uid('l'),c:'#0079bf',n:'資料'},{id:uid('l'),c:'#c377e0',n:'アイデア'}]; }
function card(t,o){ return Object.assign({id:uid('c'),title:t,desc:'',labels:[],members:[],start:'',due:'',dueDone:false,checklists:[],comments:[],cover:''},o||{}); }
function sampleBoards(){
  var lab1=defLabels();
  var b1={ id:'b1',scope:'プロジェクト',name:'HPリニューアル',bg:'#0e7490',members:['yu','de','si'],labels:lab1,lists:[
    {id:uid('L'),name:'やること',cards:[
      card('トップページのワイヤー作成',{members:['de'],due:futureISO(3),labels:[lab1[1].id],checklists:[{id:uid('k'),title:'手順',items:[{id:uid('i'),text:'構成案',done:true},{id:uid('i'),text:'ラフ',done:false},{id:uid('i'),text:'レビュー',done:false}]}]}),
      card('コラム一覧の構成決め（CoreNoteの階層図参照）',{members:['yu'],due:futureISO(1),labels:[lab1[3].id]}),
      card('写真素材の選定',{members:['si'],desc:'実績写真とスタッフ写真を中心に。'})]},
    {id:uid('L'),name:'進行中',cards:[
      card('サーバー移転の見積もり',{members:['yu'],due:pastISO(1),labels:[lab1[2].id]}),
      card('ロゴデータの整理',{members:['de'],cover:'#0079bf'})]},
    {id:uid('L'),name:'確認待ち',cards:[ card('料金表ページの文言チェック',{members:['yu'],due:futureISO(0),labels:[lab1[1].id]}) ]},
    {id:uid('L'),name:'完了',cards:[ card('ドメイン更新',{members:['yu'],due:pastISO(3),dueDone:true}) ]}
  ]};
  var lab2=defLabels();
  var b2={ id:'b2',scope:'部署',name:'車販部',bg:'#166534',members:['ha','ri','yu'],labels:lab2,lists:[
    {id:uid('L'),name:'今週',cards:[ card('展示場の配置替え',{members:['ha'],due:futureISO(2)}), card('オークション出品リスト作成',{members:['ri'],due:futureISO(1),labels:[lab2[2].id]}) ]},
    {id:uid('L'),name:'進行中',cards:[ card('下取り査定キャンペーンのPOP',{members:['ha'],labels:[lab2[4].id]}) ]},
    {id:uid('L'),name:'完了',cards:[ card('5月の販売実績まとめ',{members:['ri']}) ]}
  ]};
  var lab3=defLabels();
  var b3={ id:'b3',scope:'プロジェクト',name:'YouTube動画制作',bg:'#9a3412',members:['yu','si'],labels:lab3,lists:[
    {id:uid('L'),name:'ネタ案',cards:[ card('エンジン降ろし大作業の密着',{members:['yu'],labels:[lab3[4].id]}), card('代車20台どう管理してる？裏側公開',{members:['yu'],labels:[lab3[4].id]}) ]},
    {id:uid('L'),name:'撮影待ち',cards:[ card('車検の流れ解説（PitFlow画面付き）',{members:['si'],due:futureISO(5)}) ]},
    {id:uid('L'),name:'編集中',cards:[ card('工具紹介 第3弾',{members:['yu'],due:futureISO(2),cover:'#eb5a46'}) ]},
    {id:uid('L'),name:'公開済み',cards:[]}
  ]};
  var b4={ id:'b4',scope:'個人',name:'ゆうた個人',bg:'#334155',members:['yu'],labels:defLabels(),lists:[
    {id:uid('L'),name:'ToDo',cards:[ card('混雑アルゴリズムの数字を考える',{members:['yu']}), card('Trello・Miroの解約タイミング検討',{members:['yu']}) ]},
    {id:uid('L'),name:'完了',cards:[ card('CoreBoard/CoreNoteの名前決め',{members:['yu'],dueDone:true}) ]}
  ]};
  return [b1,b2,b3,b4];
}
function isoDay(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function futureISO(n){ var d=new Date(); d.setDate(d.getDate()+n); return isoDay(d); }
function pastISO(n){ var d=new Date(); d.setDate(d.getDate()-n); return isoDay(d); }

/* ===== 永続化（BOARDS全体） ===== */
var BOARDS=null;
function loadAll(){ try{ var raw=localStorage.getItem('cb_data_v2'); if(raw){ var d=JSON.parse(raw); if(d&&d.length){ return d; } } }catch(e){} return sampleBoards(); }
function saveAll(){ try{ localStorage.setItem('cb_data_v2', JSON.stringify(BOARDS)); }catch(e){} }

BOARDS=loadAll();
var cur=BOARDS[0]?BOARDS[0].id:null;
var filter={text:'',members:[],labels:[],due:''};
var openCardRef=null;       // {listId,cardId}
var dragCard=null, dragList=null;

function board(){ return BOARDS.find(function(b){return b.id===cur;}); }
function listOf(id){ var b=board(); return b?b.lists.find(function(l){return l.id===id;}):null; }
function findCard(cid){ var b=board(); if(!b)return null; for(var i=0;i<b.lists.length;i++){ var c=b.lists[i].cards.find(function(x){return x.id===cid;}); if(c)return {list:b.lists[i],card:c}; } return null; }
function labelOf(id){ var b=board(); return b?b.labels.find(function(l){return l.id===id;}):null; }

/* ===== サイドバー ===== */
function renderSide(){
  var groups={}; BOARDS.forEach(function(b){ (groups[b.scope]=groups[b.scope]||[]).push(b); });
  var h='';
  ['プロジェクト','部署','個人'].forEach(function(g){
    if(!groups[g])return;
    h+='<div class="sg">'+(g==='プロジェクト'?'📁':(g==='部署'?'🏢':'👤'))+' '+g+'</div>';
    groups[g].forEach(function(b){ h+='<div class="si'+(b.id===cur?' on':'')+'" onclick="openBoard(\''+b.id+'\')">📋 '+esc(b.name)+'<span class="mc">'+b.members.length+'人</span></div>'; });
  });
  document.getElementById('side-body').innerHTML=h;
}
function openBoard(id){ cur=id; filter={text:'',members:[],labels:[],due:''}; var s=document.getElementById('b-search'); if(s)s.value=''; renderSide(); renderBoard(); }
function cbNewBoard(){ var name=prompt('ボード名は？','新しいボード'); if(name==null)return; var b={id:uid('b'),scope:'プロジェクト',name:name||'新しいボード',bg:'#0e7490',members:['yu'],labels:defLabels(),lists:[{id:uid('L'),name:'やること',cards:[]},{id:uid('L'),name:'進行中',cards:[]},{id:uid('L'),name:'完了',cards:[]}]}; BOARDS.unshift(b); saveAll(); openBoard(b.id); }
function renameBoard(){ var b=board(); var n=prompt('ボード名',b.name); if(n==null)return; b.name=n.trim()||b.name; saveAll(); renderSide(); renderBoard(); }

/* ===== フィルター ===== */
function setFilterText(v){ filter.text=v.toLowerCase(); renderBoard(); }
function filterActive(){ return filter.text||filter.members.length||filter.labels.length||filter.due; }
function cardPass(c){
  if(filter.text){ var hay=(c.title+' '+(c.desc||'')).toLowerCase(); if(hay.indexOf(filter.text)<0)return false; }
  if(filter.members.length && !filter.members.some(function(m){return c.members.indexOf(m)>=0;}))return false;
  if(filter.labels.length && !filter.labels.some(function(l){return c.labels.indexOf(l)>=0;}))return false;
  if(filter.due){ var st=dueState(c); if(filter.due==='over'&&st!=='over')return false; if(filter.due==='soon'&&!(st==='soon'||st==='today'))return false; if(filter.due==='none'&&c.due)return false; if(filter.due==='done'&&!c.dueDone)return false; }
  return true;
}

/* ===== ボード描画 ===== */
function dueState(c){ if(!c.due)return ''; if(c.dueDone)return 'done'; var t=new Date(); t.setHours(0,0,0,0); var d=new Date(c.due+'T00:00:00'); var diff=Math.round((d-t)/86400000); if(diff<0)return 'over'; if(diff===0)return 'today'; if(diff<=2)return 'soon'; return 'far'; }
function dueLabel(c){ var p=c.due.split('-'); return (parseInt(p[1],10))+'/'+(parseInt(p[2],10)); }
var curView='board', calCur=null;
function setView(v){ curView=v; renderBoard(); }
function renderBoard(){
  var b=board(); if(!b)return;
  document.getElementById('main').style.background='linear-gradient(180deg,'+b.bg+'22,transparent 240px)';
  document.getElementById('b-title').textContent='📋 '+b.name;
  document.getElementById('b-scope').textContent=b.scope+'ボード';
  document.getElementById('b-mem').innerHTML=b.members.map(function(id){ var m=member(id)||{name:id,color:'#666'}; return '<span class="av" title="'+esc(m.name)+'" style="background:'+m.color+'">'+esc(initial(m.name))+'</span>'; }).join('');
  document.getElementById('b-filter').className=filterActive()?'act':'';
  renderTabs(); renderView();
}
function renderTabs(){
  var tabs=[['board','📋 ボード'],['gantt','📊 ガントチャート'],['table','▦ テーブル'],['calendar','📅 カレンダー'],['dashboard','📈 ダッシュボード']];
  document.getElementById('v-tabs').innerHTML=tabs.map(function(t){ return '<button class="vtab'+(curView===t[0]?' on':'')+'" onclick="setView(\''+t[0]+'\')">'+t[1]+'</button>'; }).join('');
}
function renderView(){
  if(curView==='table')return renderTable();
  if(curView==='calendar')return renderCalendar();
  if(curView==='gantt')return renderGantt();
  if(curView==='dashboard')return renderDashboard();
  return renderKanban();
}
function allVisibleCards(){ var b=board(); var out=[]; b.lists.forEach(function(l){ l.cards.forEach(function(c){ if(cardPass(c))out.push({list:l,card:c}); }); }); return out; }

/* ===== ビュー：ボード（カンバン） ===== */
function renderKanban(){
  var b=board(); var h='';
  b.lists.forEach(function(l){
    var cards=l.cards.filter(cardPass);
    h+='<div class="list" data-lid="'+l.id+'" ondragover="listDragOver(event,\''+l.id+'\')" ondrop="listDrop(event,\''+l.id+'\')">';
    h+='<div class="list-h"><span class="lh-grip" draggable="true" ondragstart="listDragStart(event,\''+l.id+'\')" ondragend="listDragEnd(event)" title="ドラッグで並べ替え">⠿</span><span class="lh-name" onclick="renameList(\''+l.id+'\')">'+esc(l.name)+'</span><span class="lh-cnt">'+l.cards.length+'</span><button class="lh-menu" onclick="openListMenu(event,\''+l.id+'\')">⋯</button></div>';
    h+='<div class="list-c" id="lc-'+l.id+'" ondragover="cardsDragOver(event,\''+l.id+'\')">';
    cards.forEach(function(c){ h+=cardHTML(c,l.id); });
    h+='</div><div class="list-f" id="lf-'+l.id+'"><button class="addc" onclick="startCompose(\''+l.id+'\')">＋ カードを追加</button></div></div>';
  });
  h+='<div class="add-list" id="add-list"><button onclick="startAddList()">＋ リストを追加</button></div>';
  document.getElementById('board').innerHTML='<div class="lists" id="lists">'+h+'</div>';
}

/* ===== ビュー：テーブル ===== */
function renderTable(){
  var rows=allVisibleCards();
  var h='<table class="vt"><thead><tr><th>カード</th><th>リスト</th><th>ラベル</th><th>担当</th><th>期限</th><th>チェック</th></tr></thead><tbody>';
  rows.forEach(function(r){ var c=r.card; var st=dueState(c);
    h+='<tr onclick="openCard(\''+r.list.id+'\',\''+c.id+'\')">';
    h+='<td>'+(c.cover?'<span class="tdot" style="background:'+c.cover+'"></span>':'')+esc(c.title)+'</td>';
    h+='<td>'+esc(r.list.name)+'</td>';
    h+='<td>'+c.labels.map(function(id){var l=labelOf(id);return l?'<span class="lb named" style="background:'+l.c+'">'+esc(l.n||'')+'</span> ':'';}).join('')+'</td>';
    h+='<td>'+c.members.map(function(id){var m=member(id)||{name:id,color:'#666'};return '<span class="av" style="background:'+m.color+';width:22px;height:22px;font-size:10px;margin:0 1px">'+esc(initial(m.name))+'</span>';}).join('')+'</td>';
    h+='<td>'+(c.due?'<span class="mi due '+st+'" style="display:inline-block">'+(c.dueDone?'✓ ':'')+esc(c.due)+'</span>':'<span style="color:var(--text3)">—</span>')+'</td>';
    var ci=chkInfo(c); h+='<td>'+(ci.total?('☑ '+ci.done+'/'+ci.total):'<span style="color:var(--text3)">—</span>')+'</td></tr>';
  });
  if(!rows.length)h+='<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:24px">カードがありません</td></tr>';
  h+='</tbody></table>';
  document.getElementById('board').innerHTML=h;
}

/* ===== ビュー：カレンダー ===== */
function renderCalendar(){
  if(!calCur)calCur=new Date();
  var y=calCur.getFullYear(), mo=calCur.getMonth();
  var rows=allVisibleCards(); var byDay={};
  rows.forEach(function(r){ if(r.card.due){ (byDay[r.card.due]=byDay[r.card.due]||[]).push(r); } });
  var lead=new Date(y,mo,1).getDay(), dim=new Date(y,mo+1,0).getDate(), todayIso=isoDay(new Date());
  var dow=['日','月','火','水','木','金','土'];
  var h='<div class="cal-head"><button onclick="calShift(-1)">‹</button><span class="cal-ym">'+y+'年 '+(mo+1)+'月</span><button onclick="calShift(1)">›</button><button onclick="calToday()" style="margin-left:6px">今日</button><span style="margin-left:auto;font-size:11px;color:var(--text3)">日付をダブルクリックでカード追加</span></div><div class="cal-grid">';
  for(var i=0;i<7;i++)h+='<div class="cal-dow'+(i===0?' sun':i===6?' sat':'')+'">'+dow[i]+'</div>';
  for(var k=0;k<lead;k++)h+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=dim;d++){ var iso=isoDay(new Date(y,mo,d)); var col=(lead+d-1)%7; var list=byDay[iso]||[];
    h+='<div class="cal-cell'+(iso===todayIso?' today':'')+'" ondblclick="calAdd(\''+iso+'\')"><div class="cal-d'+(col===0?' sun':col===6?' sat':'')+'">'+d+'</div>';
    list.forEach(function(r){ var c=r.card; var st=dueState(c); var lc=c.labels[0]?(labelOf(c.labels[0])||{}).c:c.cover; h+='<div class="cal-card '+st+'" onclick="event.stopPropagation();openCard(\''+r.list.id+'\',\''+c.id+'\')" title="'+esc(c.title)+'">'+(lc?'<span class="cc-dot" style="background:'+lc+'"></span>':'')+esc(c.title)+'</div>'; });
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('board').innerHTML=h;
}
function calShift(n){ if(!calCur)calCur=new Date(); calCur=new Date(calCur.getFullYear(),calCur.getMonth()+n,1); renderCalendar(); }
function calToday(){ calCur=new Date(); renderCalendar(); }
function calAdd(iso){ var b=board(); if(!b.lists.length){ toast('先にボードビューでリストを作ってください'); return; } var t=prompt(iso+' のカード名'); if(!t)return; b.lists[0].cards.push(card(t,{due:iso})); saveAll(); renderCalendar(); }

/* ===== ビュー：ガントチャート（作り込み版） ===== */
var ganttUnit='day', ganttGroup='list', ganttDrag=null;
function isoAdd(iso,n){ var d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return isoDay(d); }
function daysBetween(a,b){ return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000); }
function barRange(c){ var s=c.start,d=c.due; if(s&&d)return [s<=d?s:d, s<=d?d:s]; if(d)return [d,d]; if(s)return [s,s]; return null; }
function ganttSetUnit(u){ ganttUnit=u; renderGantt(); }
function ganttSetGroup(g){ ganttGroup=g; renderGantt(); }
function ganttGroups(dated){
  var b=board();
  if(ganttGroup==='member'){ var gs=[]; b.members.forEach(function(id){ var m=member(id); var rows=dated.filter(function(r){return r.card.members.indexOf(id)>=0;}); if(rows.length)gs.push({key:m?m.name:id,rows:rows}); }); var none=dated.filter(function(r){return !r.card.members.length;}); if(none.length)gs.push({key:'（担当なし）',rows:none}); return gs; }
  if(ganttGroup==='label'){ var gs=[]; b.labels.forEach(function(l){ var rows=dated.filter(function(r){return r.card.labels.indexOf(l.id)>=0;}); if(rows.length)gs.push({key:l.n||'(無名)',rows:rows}); }); var none=dated.filter(function(r){return !r.card.labels.length;}); if(none.length)gs.push({key:'（ラベルなし）',rows:none}); return gs; }
  return b.lists.map(function(l){ return {key:l.name,rows:dated.filter(function(r){return r.list.id===l.id;})}; }).filter(function(g){return g.rows.length;});
}
function unsDrawer(uns){ if(!uns.length)return ''; var h='<div class="gt-uns"><div class="gt-uns-h">未スケジュール（'+uns.length+'）— クリックで今日に配置／日程はカード詳細で設定</div><div class="gt-uns-l">'; uns.forEach(function(r){ h+='<span class="gt-chip" onclick="ganttSchedule(\''+r.list.id+'\',\''+r.card.id+'\')">'+esc(r.card.title)+'</span>'; }); h+='</div></div>'; return h; }

    +'<span style="margin-left:auto;font-size:11px;color:var(--text3)">バーをドラッグ＝移動／端をドラッグ＝期間変更／クリック＝詳細</span></div>';

  var dw=({day:34,week:13,month:6})[ganttUnit], padd=({day:3,week:7,month:14})[ganttUnit];
  var today=isoDay(new Date());
  var mins=dated.map(function(r){return barRange(r.card)[0];}).sort()[0];
  var es=dated.map(function(r){return barRange(r.card)[1];}).sort(); var maxs=es[es.length-1];
  if(today<mins)mins=today; if(today>maxs)maxs=today;          // 今日を必ず範囲に含める
  var min=isoAdd(mins,-padd), max=isoAdd(maxs,padd);
  var days=daysBetween(min,max)+1;
  var MINDAYS=({day:70,week:140,month:400})[ganttUnit];        // 最低表示期間を確保（軸が短すぎ対策）
  if(days<MINDAYS){ max=isoAdd(min,MINDAYS-1); days=MINDAYS; }
  var W=190+days*dw;
  var todayOff=daysBetween(min,isoDay(new Date()));
  var monthRow='', dayRow='', curM=-1;
  for(var i=0;i<days;i++){ var dd=new Date(min+'T00:00:00'); dd.setDate(dd.getDate()+i);
    if(dd.getMonth()!==curM){ curM=dd.getMonth(); monthRow+='<div class="gt-mn" style="left:'+(i*dw)+'px">'+(curM+1)+'月</div>'; }
    if(ganttUnit==='day'){ dayRow+='<div class="gt-dy'+(dd.getDay()===0?' sun':dd.getDay()===6?' sat':'')+'" style="width:'+dw+'px">'+dd.getDate()+'</div>'; }
    else if(ganttUnit==='week'&&dd.getDay()===1){ dayRow+='<div class="gt-dy" style="position:absolute;left:'+(i*dw)+'px;width:'+(dw*7)+'px;text-align:left;padding-left:3px">'+(dd.getMonth()+1)+'/'+dd.getDate()+'</div>'; }
  }
  var head='<div class="gt-row gt-head" style="width:'+W+'px"><div class="gt-lane">'+({list:'リスト',member:'担当',label:'ラベル'})[ganttGroup]+'</div><div class="gt-track" style="width:'+(days*dw)+'px"><div class="gt-months">'+monthRow+'</div><div class="gt-days" style="position:relative">'+dayRow+'</div></div></div>';
  var body='';

    body+='<div class="gt-row" style="width:'+W+'px"><div class="gt-lane">'+esc(g.key)+'</div><div class="gt-track" style="width:'+(days*dw)+'px;height:'+(g.rows.length*32+8)+'px">';
    g.rows.forEach(function(r,idx){ var rng=barRange(r.card); var off=daysBetween(min,rng[0]); var dur=daysBetween(rng[0],rng[1])+1; var lc=r.card.labels[0]?(labelOf(r.card.labels[0])||{}).c:(r.card.cover||'#06b6d4');
      body+='<div class="gt-bar" data-cid="'+r.card.id+'" data-lid="'+r.list.id+'" style="left:'+(off*dw)+'px;top:'+(idx*32+4)+'px;width:'+Math.max(dw,dur*dw-2)+'px;background:'+lc+'" onmousedown="ganttDown(event,\''+r.list.id+'\',\''+r.card.id+'\',\'move\')" title="'+esc(r.card.title)+'  '+esc(rng[0])+(rng[0]!==rng[1]?'〜'+esc(rng[1]):'')+'">'
        +'<span class="gt-h" onmousedown="ganttDown(event,\''+r.list.id+'\',\''+r.card.id+'\',\'start\')"></span>'
        +'<span class="gt-lbl">'+esc(r.card.title)+'</span>'
        +'<span class="gt-h" onmousedown="ganttDown(event,\''+r.list.id+'\',\''+r.card.id+'\',\'end\')"></span></div>';
    });
    body+='</div></div>';
  });
  var tline=(todayOff>=0&&todayOff<days)?'<div class="gt-today" style="left:'+(190+todayOff*dw)+'px"></div>':'';
  document.getElementById('board').innerHTML=tb+'<div class="gt-wrap" id="gt-wrap" data-dw="'+dw+'" data-min="'+min+'">'+tline+head+body+'</div>'+unsDrawer(uns);
}
function ganttDown(ev,lid,cid,mode){ ev.stopPropagation(); if(ev.button!==0)return; var f=findCard(cid); if(!f)return; var rng=barRange(f.card); var bar=ev.target.closest('.gt-bar'); var dw=+document.getElementById('gt-wrap').getAttribute('data-dw'); ganttDrag={cid:cid,lid:lid,mode:mode,sx:ev.clientX,dw:dw,s0:rng[0],e0:rng[1],el:bar,bl:parseFloat(bar.style.left),bw:parseFloat(bar.style.width),moved:false}; ev.preventDefault(); }
document.addEventListener('mousemove',function(ev){ if(!ganttDrag)return; var dx=ev.clientX-ganttDrag.sx; if(Math.abs(dx)>3)ganttDrag.moved=true; var el=ganttDrag.el; if(!el)return; if(ganttDrag.mode==='move'){ el.style.left=(ganttDrag.bl+dx)+'px'; } else if(ganttDrag.mode==='end'){ el.style.width=Math.max(ganttDrag.dw,ganttDrag.bw+dx)+'px'; } else if(ganttDrag.mode==='start'){ var nl=ganttDrag.bl+dx, nw=ganttDrag.bw-dx; if(nw>=ganttDrag.dw){ el.style.left=nl+'px'; el.style.width=nw+'px'; } } });
document.addEventListener('mouseup',function(ev){ if(!ganttDrag)return; var g=ganttDrag; ganttDrag=null; if(!g.moved){ openCard(g.lid,g.cid); return; } var dd=Math.round((ev.clientX-g.sx)/g.dw); var f=findCard(g.cid); if(f){ var c=f.card; if(g.mode==='move'){ c.start=isoAdd(g.s0,dd); c.due=isoAdd(g.e0,dd); } else if(g.mode==='end'){ var ne=isoAdd(g.e0,dd); if(ne<g.s0)ne=g.s0; c.due=ne; if(!c.start)c.start=g.s0; } else if(g.mode==='start'){ var ns=isoAdd(g.s0,dd); if(ns>g.e0)ns=g.e0; c.start=ns; if(!c.due)c.due=g.e0; } saveAll(); } renderGantt(); });

    +'<div class="m-sub">リスト「'+esc(l.name)+'」</div>';
  // ラベル
  if(c.labels.length){ h+='<div class="m-sec"><div class="h">🏷 ラベル</div><div class="m-chips">'+c.labels.map(function(id){var lb=labelOf(id);return lb?'<div class="chip-lb" style="background:'+lb.c+'">'+esc(lb.n||'')+'</div>':'';}).join('')+'</div></div>'; }
  // メンバー
  if(c.members.length){ h+='<div class="m-sec"><div class="h">👤 担当</div><div class="m-chips">'+c.members.map(function(id){var m=member(id)||{name:id,color:'#666'};return '<div class="chip-mem" title="'+esc(m.name)+'" style="background:'+m.color+'">'+esc(initial(m.name))+'</div>';}).join('')+'</div></div>'; }
  // 期限
  if(c.due||c.start){ var st=dueState(c); var stl={over:'期限切れ',today:'今日',soon:'もうすぐ',far:'',done:'完了'}[st]||''; h+='<div class="m-sec"><div class="h">⏰ 日程</div><div class="m-due">'+(c.start?('開始 '+esc(c.start)+'　'):'')+(c.due?('<input type="checkbox" '+(c.dueDone?'checked':'')+' onclick="cardDueDone(this.checked)"> 期限 '+esc(c.due)+(stl?' <span style="color:var(--text3)">（'+stl+'）</span>':'')):'')+'</div></div>'; }
  // 説明
  h+='<div class="m-sec"><div class="h">≡ 説明</div><textarea class="m-desc" id="m-desc" placeholder="このカードの詳しい説明を書く…" oninput="cardDesc(this.value)">'+esc(c.desc||'')+'</textarea></div>';
  // チェックリスト
  (c.checklists||[]).forEach(function(k){
    var done=k.items.filter(function(i){return i.done;}).length, tot=k.items.length, pct=tot?Math.round(done/tot*100):0;
    h+='<div class="m-sec chk"><div class="h">☑ '+esc(k.title)+' <span style="margin-left:auto;font-weight:400;color:var(--text3)">'+pct+'%</span> <button class="mini" style="background:none;border:0;color:var(--text3);margin-left:6px" onclick="delChecklist(\''+k.id+'\')">🗑</button></div>';
    h+='<div class="chk-bar"><i style="width:'+pct+'%"></i></div>';
    k.items.forEach(function(it){ h+='<div class="chk-item'+(it.done?' done':'')+'"><input type="checkbox" '+(it.done?'checked':'')+' onclick="toggleChk(\''+k.id+'\',\''+it.id+'\')"><span>'+esc(it.text)+'</span><button class="del" onclick="delChkItem(\''+k.id+'\',\''+it.id+'\')">✕</button></div>'; });
    h+='<div class="chk-add"><input type="text" placeholder="項目を追加（Enter）" onkeydown="if(event.key===\'Enter\'){addChkItem(\''+k.id+'\',this.value);this.value=\'\';}"></div></div>';
  });
  // コメント
  h+='<div class="m-sec"><div class="h">💬 コメント・アクティビティ</div>'
    +'<div class="cm-add"><div class="chip-mem" style="background:'+(member('yu')?member('yu').color:'#0891b2')+'">'+esc(initial('ゆうた'))+'</div><textarea id="m-cm" placeholder="コメントを書く…"></textarea></div>'
    +'<div style="text-align:right;margin:-4px 0 10px"><button class="tb-btn primary" style="padding:5px 12px" onclick="addComment()">コメント</button></div>';
  (c.comments||[]).slice().reverse().forEach(function(cm){ var m=member(cm.who)||{name:cm.who,color:'#666'}; h+='<div class="cm-item"><div class="chip-mem" style="background:'+m.color+'">'+esc(initial(m.name))+'</div><div class="b"><div><span class="who">'+esc(m.name)+'</span><span class="at">'+esc(cm.at)+'</span></div><div class="tx">'+esc(cm.text)+'</div></div></div>'; });
  h+='</div></div>';
  // サイドバー
  h+='<div class="m-side"><div class="sh">カードに追加</div>'
    +'<button class="sbtn" onclick="openMembers(event)">👤 担当</button>'
    +'<button class="sbtn" onclick="openLabels(event)">🏷 ラベル</button>'
    +'<button class="sbtn" onclick="openDue(event)">⏰ 期限</button>'
    +'<button class="sbtn" onclick="addChecklist()">☑ チェックリスト</button>'
    +'<button class="sbtn" onclick="openCover(event)">🎨 カバー</button>'
    +'<div class="sh">アクション</div>'
    +'<button class="sbtn danger" onclick="deleteCard()">🗑 削除</button>'
    +'</div></div>';
  document.getElementById('mbox').innerHTML=h;
  var ta=document.getElementById('m-title'); if(ta){ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; }
}
function cardTitle(v){ var c=curCard(); if(c){ c.title=v; saveAll(); } }
function cardDesc(v){ var c=curCard(); if(c){ c.desc=v; saveAll(); } }
function cardDueDone(b){ var c=curCard(); if(c){ c.dueDone=b; saveAll(); renderCard(); } }
function addComment(){ var c=curCard(); var ta=document.getElementById('m-cm'); if(!c||!ta)return; var t=ta.value.trim(); if(!t)return; var now=new Date(); c.comments.push({who:'yu',text:t,at:(now.getMonth()+1)+'/'+now.getDate()+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')}); saveAll(); renderCard(); }
function deleteCard(){ var c=curCard(); if(!c)return; if(!confirm('カードを削除しますか？'))return; var f=findCard(c.id); f.list.cards=f.list.cards.filter(function(x){return x.id!==c.id;}); saveAll(); closeCard(); }
/* チェックリスト */
function addChecklist(){ var c=curCard(); if(!c)return; var t=prompt('チェックリスト名','タスク'); if(t==null)return; c.checklists.push({id:uid('k'),title:t.trim()||'タスク',items:[]}); saveAll(); renderCard(); }
function delChecklist(kid){ var c=curCard(); c.checklists=c.checklists.filter(function(k){return k.id!==kid;}); saveAll(); renderCard(); }
function addChkItem(kid,text){ text=(text||'').trim(); if(!text)return; var c=curCard(); var k=c.checklists.find(function(x){return x.id===kid;}); k.items.push({id:uid('i'),text:text,done:false}); saveAll(); renderCard(); }
function toggleChk(kid,iid){ var c=curCard(); var k=c.checklists.find(function(x){return x.id===kid;}); var it=k.items.find(function(x){return x.id===iid;}); it.done=!it.done; saveAll(); renderCard(); }
function delChkItem(kid,iid){ var c=curCard(); var k=c.checklists.find(function(x){return x.id===kid;}); k.items=k.items.filter(function(x){return x.id!==iid;}); saveAll(); renderCard(); }
/* メンバー選択 */
function openMembers(ev){ var c=curCard(); var b=board(); var h='<h4>担当</h4><button class="px" onclick="closePop()">✕</button>'; b.members.forEach(function(id){ var m=member(id); if(!m)return; var on=c.members.indexOf(id)>=0; h+='<div class="row" onclick="toggleCardMember(\''+id+'\')"><span class="chip-mem" style="width:26px;height:26px;background:'+m.color+'">'+esc(initial(m.name))+'</span><span style="flex:1">'+esc(m.name)+'</span>'+(on?'<span style="color:var(--acc2)">✓</span>':'')+'</div>'; }); showPop(ev,h); }
function toggleCardMember(id){ var c=curCard(); var i=c.members.indexOf(id); if(i>=0)c.members.splice(i,1); else c.members.push(id); saveAll(); renderCard(); }
/* ラベル選択 */
function openLabels(ev){ var c=curCard(); var b=board(); var h='<h4>ラベル</h4><button class="px" onclick="closePop()">✕</button>'; b.labels.forEach(function(l){ var on=c.labels.indexOf(l.id)>=0; h+='<div class="row"><div class="lbopt" style="background:'+l.c+'" onclick="toggleCardLabel(\''+l.id+'\')">'+esc(l.n||'')+'</div>'+(on?'<span style="color:var(--acc2)">✓</span>':'<span style="width:14px"></span>')+'<button class="mini" onclick="editLabel(\''+l.id+'\')">✎</button></div>'; }); h+='<button class="pbtn" onclick="addLabel()">＋ ラベルを作る</button>'; showPop(ev,h); }
function toggleCardLabel(id){ var c=curCard(); var i=c.labels.indexOf(id); if(i>=0)c.labels.splice(i,1); else c.labels.push(id); saveAll(); renderCard(); }
function addLabel(){ var b=board(); var col=LB[b.labels.length%LB.length].c; b.labels.push({id:uid('l'),c:col,n:''}); saveAll(); var c=curCard(); openLabels({clientX:innerWidth/2,clientY:140}); }
function editLabel(id){ var b=board(); var l=b.labels.find(function(x){return x.id===id;}); var n=prompt('ラベル名（空でもOK）',l.n||''); if(n==null)return; l.n=n.trim(); var ci=prompt('色番号 1緑2黄3橙4赤5紫6青7水8黄緑9桃10黒（空でそのまま）',''); if(ci){ var idx=parseInt(ci,10)-1; if(LB[idx])l.c=LB[idx].c; } saveAll(); renderCard(); openLabels({clientX:innerWidth/2,clientY:140}); }
/* 期限 */
function openDue(ev){ var c=curCard(); var h='<h4>開始日・期限</h4><button class="px" onclick="closePop()">✕</button>'
  +'<div style="font-size:11px;color:var(--text3);margin:2px 0 3px">開始日</div><input type="date" id="start-in" value="'+esc(c.start||'')+'">'
  +'<div style="font-size:11px;color:var(--text3);margin:8px 0 3px">期限</div><input type="date" id="due-in" value="'+esc(c.due||'')+'">'
  +'<button class="pbtn" onclick="setDates()">設定</button>'
  +((c.due||c.start)?'<button class="pbtn" style="background:var(--bg3);color:var(--text);margin-top:6px" onclick="clearDates()">日付を外す</button>':'');
  showPop(ev,h); }
function setDates(){ var c=curCard(); var s=document.getElementById('start-in').value, d=document.getElementById('due-in').value; if(s&&d&&s>d){ var t=s;s=d;d=t; } c.start=s; c.due=d; saveAll(); closePop(); renderCard(); }
function clearDates(){ var c=curCard(); c.start=''; c.due=''; c.dueDone=false; saveAll(); closePop(); renderCard(); }
/* カバー */
function openCover(ev){ var c=curCard(); var h='<h4>カバー色</h4><button class="px" onclick="closePop()">✕</button><div style="display:flex;gap:8px;flex-wrap:wrap;padding:4px">'; LB.forEach(function(l){ h+='<span onclick="setCover(\''+l.c+'\')" style="width:34px;height:28px;border-radius:6px;background:'+l.c+';cursor:pointer;border:2px solid '+(c.cover===l.c?'#fff':'transparent')+'"></span>'; }); h+='</div><button class="pbtn" style="background:var(--bg3);color:var(--text)" onclick="setCover(\'\')">カバーなし</button>'; showPop(ev,h); }
function setCover(c2){ var c=curCard(); c.cover=c2; saveAll(); closePop(); renderCard(); }

/* ===== フィルター ポップ ===== */
function openFilter(ev){
  var b=board();
  var h='<h4>フィルター</h4><button class="px" onclick="closePop()">✕</button>';
  h+='<div style="font-size:11px;color:var(--text3);margin:6px 0 3px">担当</div>';
  b.members.forEach(function(id){ var m=member(id); if(!m)return; var on=filter.members.indexOf(id)>=0; h+='<div class="row" onclick="toggleFilter(\'members\',\''+id+'\')"><span class="chip-mem" style="width:24px;height:24px;background:'+m.color+'">'+esc(initial(m.name))+'</span><span style="flex:1">'+esc(m.name)+'</span>'+(on?'✓':'')+'</div>'; });
  h+='<div style="font-size:11px;color:var(--text3);margin:8px 0 3px">ラベル</div>';
  b.labels.forEach(function(l){ var on=filter.labels.indexOf(l.id)>=0; h+='<div class="row" onclick="toggleFilter(\'labels\',\''+l.id+'\')"><div class="lbopt" style="background:'+l.c+'">'+esc(l.n||'')+'</div>'+(on?'✓':'')+'</div>'; });
  h+='<div style="font-size:11px;color:var(--text3);margin:8px 0 3px">期限</div>';
  [['over','期限切れ'],['soon','まもなく/今日'],['done','完了'],['none','期限なし']].forEach(function(o){ var on=filter.due===o[0]; h+='<div class="row" onclick="setDueFilter(\''+o[0]+'\')">'+(on?'● ':'○ ')+o[1]+'</div>'; });
  h+='<button class="pbtn" style="background:var(--bg3);color:var(--text)" onclick="clearFilter()">フィルター解除</button>';
  showPop(ev,h);
}
function toggleFilter(kind,id){ var arr=filter[kind]; var i=arr.indexOf(id); if(i>=0)arr.splice(i,1); else arr.push(id); renderBoard(); openFilter({clientX:innerWidth-160,clientY:120}); }
function setDueFilter(v){ filter.due=filter.due===v?'':v; renderBoard(); openFilter({clientX:innerWidth-160,clientY:120}); }
function clearFilter(){ filter={text:filter.text,members:[],labels:[],due:''}; closePop(); renderBoard(); }

/* ===== ポップ/メニュー 共通 ===== */
function showPop(ev,h){ var p=document.getElementById('pop'); p.innerHTML=h; p.classList.add('open'); posFloat(p,ev); }
function showPopCenter(h){ var p=document.getElementById('pop'); p.innerHTML=h; p.classList.add('open'); p.style.left=(innerWidth/2-140)+'px'; p.style.top='120px'; }
function closePop(){ document.getElementById('pop').classList.remove('open'); }
function showMenu(ev,h){ var m=document.getElementById('menu'); m.innerHTML=h; m.classList.add('open'); posFloat(m,ev); }
function closeMenu(){ document.getElementById('menu').classList.remove('open'); }
function posFloat(el,ev){ var x=(ev&&ev.clientX!=null)?ev.clientX:innerWidth/2, y=(ev&&ev.clientY!=null)?ev.clientY:120; var w=el.offsetWidth||260, hgt=el.offsetHeight||200; el.style.left=Math.max(8,Math.min(innerWidth-w-8,x))+'px'; el.style.top=Math.max(8,Math.min(innerHeight-hgt-8,y+8))+'px'; }
document.addEventListener('mousedown',function(ev){ if(!ev.target.closest('#pop')&&!ev.target.closest('.sbtn')&&!ev.target.closest('.lh-menu')&&!ev.target.closest('#b-filter')&&!ev.target.closest('.row')&&!ev.target.closest('.mini')&&!ev.target.closest('.px'))closePop(); if(!ev.target.closest('#menu')&&!ev.target.closest('.lh-menu')&&!ev.target.closest('[onclick^="openBoardMenu"]'))closeMenu(); });
document.getElementById('modal').addEventListener('mousedown',function(ev){ if(ev.target===this)closeCard(); });
document.addEventListener('keydown',function(ev){ if(ev.key==='Escape'){ if(document.getElementById('pop').classList.contains('open')){closePop();return;} if(document.getElementById('menu').classList.contains('open')){closeMenu();return;} if(openCardRef)closeCard(); } });

/* ===== 起動 ===== */
renderSide(); if(cur)renderBoard();
</script>
<script src="js/launcher.js?v=6"></script>
</body>
</html>
